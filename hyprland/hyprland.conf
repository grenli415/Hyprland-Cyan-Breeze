# Hyprland Configuration

# Монитор / Monitor setup
monitor=,preferred,auto,auto

# Автозапуск / Autostart
exec-once = waybar &
exec-once = wofi --show drun

# Обои / Wallpaper (example with hyprpaper)
# exec-once = hyprpaper

# Настройка клавиатуры / Keyboard setup
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
}

# Горячие клавиши / Keybinds
# Запуск терминала / Launch terminal
bind = SUPER, Q, exec, wezterm

# Закрыть окно / Close window
bind = SUPER, C, killactive, 

# Меню запуска / Launcher
bind = SUPER, Space, exec, wofi --show drun
